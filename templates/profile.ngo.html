<link href="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
<script src="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" defer></script>
<script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<!------ Include the above in your HEAD tag ---------->

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</head>

<hr>
<div class="container bootstrap snippet">
    <div class="row">
        <div class="col-sm-10"><h1 style="font-size: 25px; margin-left: 41px ;">Account Settings</h1></div>
    </div>
    <div class="row">
        <div class="col-sm-3"><!--left col-->
          <div class="text-center">
            <form class="form" method="POST" enctype="multipart/form-data">
              {% csrf_token %}
            {% if request.user.ngo.profile_picture %}
              <img src="{{ request.user.ngo.profile_picture.url }}" class="avatar img-circle img-thumbnail" alt="avatar">
            {% else %}
              <img src="http://ssl.gstatic.com/accounts/ui/avatar_2x.png" class="avatar img-circle img-thumbnail" alt="Default Avatar">
            {% endif %}
            <h6>Upload a different photo...</h6>
                    <input type="file" name="profile_picture" accept="image/*" class="text-center center-block file-upload" style="margin-left: 35px; ">
                
            </div>
            <hr><br>
        </div><!--/col-3-->
        <div class="col-sm-9">
            <div class="tab-content">
                <div class="tab-pane active" id="home">
                    <p style="font-family: Poppins, sans-serif; font-size:xx-large;">EDIT YOUR INFORMATION:</p>
                    <hr>
                        <div class="form-group">
                            <div class="col-xs-6">
                                <label for="cuisine_type">
                                    <h4 style="color: #18a577; font-family: Montserrat, sans-serif; font-weight: bold;">Type of Cuisine you have:</h4>
                                </label>
                                <select class="form-control" name="capacity" id="capacity" style="height: calc(2.25rem + 5px);">
                                    <option value="less than 100" {% if capacity == 'less than 100' %}selected{% endif %}>less than 100</option>
                                    <option value="100-200" {% if capacity == '100-200' %}selected{% endif %}>100-200</option>
                                    <option value="200-500" {% if capacity == '200-500' %}selected{% endif %}>200-500</option>
                                    <option value="more than 500" {% if capacity == 'more than 500' %}selected{% endif %}>more than 500</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-xs-6">
                                <label for="name"><h4>Name</h4></label>
                                <input type="text" class="form-control" name="name" id="name" placeholder="Username" value="{{ name }}" title="enter your username if any.">
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-xs-6">
                                <label for="contact_phone"><h4>Phone</h4></label>
                                <input type="text" class="form-control" name="contact_phone" id="contact_phone" placeholder="enter phone" value="{{ contact_phone }}" title="enter your phone number if any.">
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-xs-6">
                                <label for="location"><h4>Location</h4></label>
                                <input type="text" class="form-control" name="location" placeholder="somewhere" value="{{ location }}" title="enter a location">
                            </div>
                        </div>
                           <br>
                           <br>
                          
                        <div class="form-group">
                            <div class="col-xs-12">
                              <br>
                              <p class="social-text"><a href="/password_reset/">Reset your password </a></p>
                                <br>
                                <button class="btn btn-lg btn-success" type="submit"><i class="glyphicon glyphicon-ok-sign"></i> Save</button>
                            </div>
                        </div>
                    </form>
                    <hr>
                </div><!--/tab-pane-->
            </div><!--/tab-content-->
        </div><!--/col-9-->
    </div><!--/row-->
    <script>
        $(document).ready(function() {
            var readURL = function(input) {
                if (input.files && input.files[0]) {
                    var reader = new FileReader();

                    reader.onload = function (e) {
                        $('.avatar').attr('src', e.target.result);
                    }

                    reader.readAsDataURL(input.files[0]);
                }
            }

            $(".file-upload").on('change', function(){
                readURL(this);
            });
        });
    </script>
</div>
