                <input type="checkbox" name="check" id="check">Predict <br>

            <div class="input_field">
                <label for="delivery_time" class="form-label">Delivery Time</label>
                <input type="time" class="form-control input" id="delivery_time" name="delivery_time" required>
            </div>
            <div class="btn1">
