<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
    src="https://kit.fontawesome.com/64d58efce2.js"
    crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="../../media/media/style1.css" />
    <!-- <link rel="stylesheet" href="css/style.css"> -->
    <title>End Hunger</title>
</head>
<body>

    <div class="wrap">
		<div class="container1">
			<div class="row">
				<div class="col-md-6 d-flex align-items-center">
					<p class="mb-0 phone pl-md-2">
						<a href="/" class="mr-2">EndHunger</a>
					</p>
				</div>
				<div class="col-md-6 d-flex justify-content-md-end">
					<div class="social-media">
						<p class="mb-0 d-flex">
							<a href="/" class="d-flex align-items-center justify-content-center"><span>Home</span></a>
						</p>
					</div>
				</div>
			</div>
		</div>
	</div>
    <!-- sign in -->
    <div class="container">
        <div class="forms-container">
            <div class="signin-signup">
            <form method="post" class="sign-in-form" action="{% url 'login' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <h2 class="title">Sign in</h2>
                <div class="input-field">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Username" name="username" />
                </div>
                <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Password" name="password" />
                </div>
                <input type="submit" value="Login" class="btn solid" />
                <p class="social-text"><a href="{% url 'password_reset' %}">Forgot Password?</a></p>
            </form>
            <!-- sign up -->
            <form method="post" class="sign-up-form" action="{% url 'register' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <h2 class="title">Sign up</h2>
                <div class="input-field">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Username" name="name"  />
                </div>
                <div class="input-field">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="Email" name="email"/>
                </div>
                <div class="input-field">
                <i class="fas fa-mobile"></i>
                <input type="tel" placeholder="Phone Number" name="phone" />
                </div>
                <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Password" name="password" />
                </div>
                <div class="radio-container">
                    <div style="margin-right: 20px;">
                        <input type="radio" id="restaurant" name="choice" value="Restaurant">
                        <label for="restaurant"> Restaurant</label>
                    </div>
                    <div>
                        <input type="radio" id="charity" name="choice" value="Charity">
                        <label for="charity"> Charity</label>
                    </div>
                </div>
                <input type="submit" class="btn" value="Sign up" />
            </form>
            </div>
        </div>

        <div class="panels-container">
            <div class="panel left-panel">
            <div class="content">
                <h3 style="margin-bottom: 20px;">New here ?</h3>
                <button class="btn transparent" id="sign-up-btn">
                Sign up
                </button>
            </div>
            <img src="../../media/media/login1.png" class="image" alt="" />
            </div>
            <div class="panel right-panel">
            <div class="content">
                <h3>One of us ?</h3>
                <button class="btn transparent" id="sign-in-btn">
                Sign in
                </button>
            </div>
            <img src="../../media/media/register1.png" class="image" alt="" />
            </div>
        </div>
    </div>

    <script>
    const sign_in_btn = document.querySelector("#sign-in-btn");
    const sign_up_btn = document.querySelector("#sign-up-btn");
    const container = document.querySelector(".container");

    sign_up_btn.addEventListener("click", () => {
        container.classList.add("sign-up-mode");
    });

    sign_in_btn.addEventListener("click", () => {
        container.classList.remove("sign-up-mode");
    });
    </script>
</body>
</html>
